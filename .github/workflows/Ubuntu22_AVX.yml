name: Ubuntu 22.04 - AVX

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  OMP_WAIT_POLICY: PASSIVE

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/Build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DMTL_ENABLE_SSE=ON -DMTL_ENABLE_AVX=ON

    - name: Build
      run: cmake --build ${{github.workspace}}/Build

    - name: Run Tests
      working-directory: ${{github.workspace}}
      run: python3 RunTests.py -ConsoleOut

    - name: Upload test log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-log-ubuntu22-avx
        path: Build/TestLog_*.txt

    - name: Publish test log to job summary
      if: always()
      shell: bash
      run: |
        log=$(ls -t Build/TestLog_*.txt 2>/dev/null | head -1)
        if [ -n "$log" ]; then
          echo "## Test log: $(basename "$log")" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat "$log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi
