name: Test Coverage Ubuntu

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  OMP_WAIT_POLICY: PASSIVE
  # gcov counters are atomic and serialize OpenMP threads under heavy
  # contention, so multi-threaded tests run *slower* with --coverage.
  # Pin to one thread for the coverage build to keep the workflow short.
  OMP_NUM_THREADS: 1

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v5

    - name: Install gcovr
      run: pip install gcovr

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2.23
      with:
        key: coverage-ubuntu-24.04

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/Build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DMTL_ENABLE_COVERAGE=ON -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache

    - name: Build
      run: cmake --build ${{github.workspace}}/Build --parallel

    - name: Run Tests with Coverage
      working-directory: ${{github.workspace}}
      run: python3 RunTests.py -ConsoleOut -Coverage

    - name: Upload test log
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-log-ubuntu
        path: Build/TestLog_*.txt

    - name: Publish test log to job summary
      if: always()
      shell: bash
      working-directory: ${{github.workspace}}
      run: |
        log=$(ls -t Build/TestLog_*.txt 2>/dev/null | head -1)
        if [ -z "$log" ]; then
          echo "## Test log" >> "$GITHUB_STEP_SUMMARY"
          echo "_No TestLog_*.txt file found in Build/. Directory listing:_" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -la Build/ >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit 0
        fi

        # Strip ANSI escape sequences so the log renders as plain text in the
        # GitHub job summary (which does not interpret terminal colors).
        clean=$(mktemp)
        sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g; s/\x1B\][^\x07]*\x07//g' "$log" > "$clean"

        # Pull the three percentages out of gcovr's --print-summary block and
        # render them as a Markdown table at the top of the summary.
        lines_pct=$(grep -E '^lines: '     "$clean" | tail -1 || true)
        funcs_pct=$(grep -E '^functions: ' "$clean" | tail -1 || true)
        brnch_pct=$(grep -E '^branches: '  "$clean" | tail -1 || true)
        if [ -n "$lines_pct$funcs_pct$brnch_pct" ]; then
          echo "## Test coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Coverage | Hit / Total |" >> "$GITHUB_STEP_SUMMARY"
          echo "| --- | ---: | ---: |" >> "$GITHUB_STEP_SUMMARY"
          for row in "$lines_pct" "$funcs_pct" "$brnch_pct"; do
            [ -z "$row" ] && continue
            metric=$(echo "$row" | awk -F: '{print $1}' | sed 's/.*/\u&/')
            pct=$(echo "$row" | grep -oE '[0-9]+(\.[0-9]+)?%' | head -1)
            ratio=$(echo "$row" | grep -oE '[0-9]+ out of [0-9]+' | head -1)
            echo "| $metric | $pct | $ratio |" >> "$GITHUB_STEP_SUMMARY"
          done
          echo "" >> "$GITHUB_STEP_SUMMARY"
        fi

        # Per-file coverage table parsed from the gcovr --txt block in the log.
        # gcovr wraps long file names onto a continuation line, so we glue
        # such pairs together before splitting into Markdown columns.
        python3 - "$clean" >> "$GITHUB_STEP_SUMMARY" <<'PY'
        import re, sys
        text = open(sys.argv[1], encoding='utf-8', errors='replace').read()
        match = re.search(
          r'^File\s+Lines\s+Exec\s+Cover\s+Missing\s*\n-+\n(.*?)\n-+\nTOTAL\s+(\d+)\s+(\d+)\s+(\d+)%',
          text, re.M | re.S)
        if not match:
          sys.exit(0)
        body, total_lines, total_exec, total_pct = match.groups()
        rows = []
        pending = None
        for raw in body.splitlines():
          if not raw.strip():
            continue
          parts = raw.split()
          if pending is not None:
            rows.append((pending, parts[0], parts[1], parts[2],
                         ' '.join(parts[3:]) if len(parts) > 3 else ''))
            pending = None
            continue
          if len(parts) >= 4 and parts[1].isdigit():
            rows.append((parts[0], parts[1], parts[2], parts[3],
                         ' '.join(parts[4:]) if len(parts) > 4 else ''))
          else:
            pending = parts[0]
        print('## Test coverage details')
        print()
        print('<details><summary>Per-file coverage</summary>')
        print()
        print('| File | Lines | Exec | Cover | Missing |')
        print('| --- | ---: | ---: | ---: | --- |')
        for f, ln, ex, cov, miss in rows:
          print(f'| `{f}` | {ln} | {ex} | {cov} | {miss} |')
        print(f'| **TOTAL** | **{total_lines}** | **{total_exec}** | **{total_pct}%** | |')
        print()
        print('</details>')
        print()
        PY

        echo "## Test log" >> "$GITHUB_STEP_SUMMARY"
        echo "_File: \`$log\`_" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "<details><summary>Show log</summary>" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        cat "$clean" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "</details>" >> "$GITHUB_STEP_SUMMARY"
